name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build:
    name: Build Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build backend
        run: |
          cd backend
          go mod download
          go build ./...

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python syntax check
        run: python -m compileall quant

  publish_images:
    name: Build and Push Images
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/pumpkin-pro-backend:latest
            ghcr.io/${{ github.repository_owner }}/pumpkin-pro-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/pumpkin-pro-frontend:latest
            ghcr.io/${{ github.repository_owner }}/pumpkin-pro-frontend:${{ github.sha }}

      - name: Build and push quant image
        uses: docker/build-push-action@v6
        with:
          context: ./quant
          file: ./quant/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/pumpkin-pro-quant:latest
            ghcr.io/${{ github.repository_owner }}/pumpkin-pro-quant:${{ github.sha }}

  deploy:
    name: Deploy to Server
    needs: publish_images
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Deploy over SSH (key auth)
        if: ${{ vars.DEPLOY_AUTH_METHOD == 'ssh' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
          DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}
          DEPLOY_GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
          DEPLOY_GHCR_USER: ${{ secrets.DEPLOY_GHCR_USER }}
          DEPLOY_GHCR_TOKEN: ${{ secrets.DEPLOY_GHCR_TOKEN }}
          DEPLOY_MONITOR_SECONDS: ${{ vars.DEPLOY_MONITOR_SECONDS }}
          DEPLOY_HEALTHCHECK_URL: ${{ vars.DEPLOY_HEALTHCHECK_URL }}
          IMAGE_TAG: ${{ github.sha }}
          IMAGE_REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          script_stop: true
          command_timeout: 340m
          envs: DEPLOY_APP_DIR,DEPLOY_REPO_URL,DEPLOY_BRANCH,DEPLOY_GITHUB_TOKEN,DEPLOY_GHCR_USER,DEPLOY_GHCR_TOKEN,DEPLOY_MONITOR_SECONDS,DEPLOY_HEALTHCHECK_URL,IMAGE_TAG,IMAGE_REPO_OWNER,IMAGE_REGISTRY,GITHUB_RUN_ID,GITHUB_RUN_ATTEMPT
          script: |
            set -euo pipefail

            APP_DIR="${DEPLOY_APP_DIR:-/opt/pumpkin-pro}"
            RAW_REPO_URL="${DEPLOY_REPO_URL:-https://github.com/${{ github.repository }}.git}"
            BRANCH="${DEPLOY_BRANCH:-main}"
            REPO_URL="$RAW_REPO_URL"
            REGISTRY="${IMAGE_REGISTRY:-ghcr.io}"
            OWNER="${IMAGE_REPO_OWNER:-${{ github.repository_owner }}}"
            TAG="${IMAGE_TAG:-latest}"
            MONITOR_SECONDS="${DEPLOY_MONITOR_SECONDS:-1200}"
            HEALTHCHECK_URL="${DEPLOY_HEALTHCHECK_URL:-http://127.0.0.1:8080/api/health}"
            RUN_ID="${GITHUB_RUN_ID:-manual}-${GITHUB_RUN_ATTEMPT:-0}"

            if [ -n "${DEPLOY_GITHUB_TOKEN:-}" ] && printf '%s' "$RAW_REPO_URL" | grep -q '^https://github.com/'; then
              REPO_URL="$(printf '%s' "$RAW_REPO_URL" | sed "s#https://github.com/#https://x-access-token:${DEPLOY_GITHUB_TOKEN}@github.com/#")"
            fi

            retry() {
              local retries=3
              local count=1
              until "$@"; do
                if [ "$count" -ge "$retries" ]; then
                  return 1
                fi
                count=$((count + 1))
                sleep 10
              done
            }

            if ! command -v git >/dev/null 2>&1; then
              echo "git is required on target server"
              exit 1
            fi
            if ! command -v docker >/dev/null 2>&1; then
              echo "docker is required on target server"
              exit 1
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "docker compose is required on target server"
              exit 1
            fi

            DEPLOY_STATE_DIR="$APP_DIR/.deploy"
            STATUS_FILE="$DEPLOY_STATE_DIR/status-${RUN_ID}.txt"
            LOG_FILE="$DEPLOY_STATE_DIR/deploy-${RUN_ID}.log"
            RUN_SCRIPT="$DEPLOY_STATE_DIR/run-${RUN_ID}.sh"

            mkdir -p "$APP_DIR" "$DEPLOY_STATE_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              retry git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git remote set-url origin "$REPO_URL" || true
            retry git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            if [ -n "${DEPLOY_GHCR_TOKEN:-}" ]; then
              GHCR_USER="${DEPLOY_GHCR_USER:-${{ github.repository_owner }}}"
              echo "${DEPLOY_GHCR_TOKEN}" | docker login "$REGISTRY" -u "$GHCR_USER" --password-stdin
            fi

            cat > "$RUN_SCRIPT" <<'SCRIPT'
            #!/usr/bin/env bash
            set -euo pipefail

            retry() {
              local retries=3
              local count=1
              until "$@"; do
                if [ "$count" -ge "$retries" ]; then
                  return 1
                fi
                count=$((count + 1))
                sleep 10
              done
            }

            probe_health() {
              if command -v curl >/dev/null 2>&1; then
                curl -fsS --max-time 5 "$HEALTHCHECK_URL" >/dev/null
                return $?
              fi
              if command -v wget >/dev/null 2>&1; then
                wget -q -T 5 -O - "$HEALTHCHECK_URL" >/dev/null
                return $?
              fi
              return 0
            }
            echo "running" > "$STATUS_FILE"
            cd "$APP_DIR"

            if retry env IMAGE_REGISTRY="$REGISTRY" IMAGE_REPO_OWNER="$OWNER" IMAGE_TAG="$TAG" docker compose pull && \
               env IMAGE_REGISTRY="$REGISTRY" IMAGE_REPO_OWNER="$OWNER" IMAGE_TAG="$TAG" docker compose up -d --remove-orphans; then
              ATTEMPT=0
              until probe_health; do
                ATTEMPT=$((ATTEMPT + 1))
                if [ "$ATTEMPT" -ge 30 ]; then
                  echo "health check failed for ${TAG}" >&2
                  echo "failed" > "$STATUS_FILE"
                  exit 1
                fi
                sleep 10
              done

              echo "success" > "$STATUS_FILE"
              docker image prune -f || true
              exit 0
            fi

            echo "failed" > "$STATUS_FILE"
            exit 1
            SCRIPT

            chmod +x "$RUN_SCRIPT"

            nohup env APP_DIR="$APP_DIR" REGISTRY="$REGISTRY" OWNER="$OWNER" TAG="$TAG" STATUS_FILE="$STATUS_FILE" LOG_FILE="$LOG_FILE" HEALTHCHECK_URL="$HEALTHCHECK_URL" "$RUN_SCRIPT" > "$LOG_FILE" 2>&1 &
            DEPLOY_PID=$!
            echo "Deployment started in background: pid=$DEPLOY_PID"
            echo "Status file: $STATUS_FILE"
            echo "Log file: $LOG_FILE"

            ELAPSED=0
            INTERVAL=15
            while [ "$ELAPSED" -lt "$MONITOR_SECONDS" ]; do
              STATUS="$(cat "$STATUS_FILE" 2>/dev/null || echo running)"
              if [ "$STATUS" = "success" ]; then
                echo "Deployment completed successfully."
                exit 0
              fi
              if [ "$STATUS" = "failed" ]; then
                echo "Deployment failed. Showing last 120 log lines:"
                tail -n 120 "$LOG_FILE" || true
                exit 1
              fi
              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            echo "Deployment is still running after ${MONITOR_SECONDS}s. CI exits without waiting further."
            echo "You can continue watching server log: tail -f $LOG_FILE"

      - name: Deploy over SSH (password auth)
        if: ${{ vars.DEPLOY_AUTH_METHOD != 'ssh' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
          DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}
          DEPLOY_GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
          DEPLOY_GHCR_USER: ${{ secrets.DEPLOY_GHCR_USER }}
          DEPLOY_GHCR_TOKEN: ${{ secrets.DEPLOY_GHCR_TOKEN }}
          DEPLOY_MONITOR_SECONDS: ${{ vars.DEPLOY_MONITOR_SECONDS }}
          DEPLOY_HEALTHCHECK_URL: ${{ vars.DEPLOY_HEALTHCHECK_URL }}
          IMAGE_TAG: ${{ github.sha }}
          IMAGE_REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script_stop: true
          command_timeout: 340m
          envs: DEPLOY_APP_DIR,DEPLOY_REPO_URL,DEPLOY_BRANCH,DEPLOY_GITHUB_TOKEN,DEPLOY_GHCR_USER,DEPLOY_GHCR_TOKEN,DEPLOY_MONITOR_SECONDS,DEPLOY_HEALTHCHECK_URL,IMAGE_TAG,IMAGE_REPO_OWNER,IMAGE_REGISTRY,GITHUB_RUN_ID,GITHUB_RUN_ATTEMPT
          script: |
            set -euo pipefail

            APP_DIR="${DEPLOY_APP_DIR:-/opt/pumpkin-pro}"
            RAW_REPO_URL="${DEPLOY_REPO_URL:-https://github.com/${{ github.repository }}.git}"
            BRANCH="${DEPLOY_BRANCH:-main}"
            REPO_URL="$RAW_REPO_URL"
            REGISTRY="${IMAGE_REGISTRY:-ghcr.io}"
            OWNER="${IMAGE_REPO_OWNER:-${{ github.repository_owner }}}"
            TAG="${IMAGE_TAG:-latest}"
            MONITOR_SECONDS="${DEPLOY_MONITOR_SECONDS:-1200}"
            HEALTHCHECK_URL="${DEPLOY_HEALTHCHECK_URL:-http://127.0.0.1:8080/api/health}"
            RUN_ID="${GITHUB_RUN_ID:-manual}-${GITHUB_RUN_ATTEMPT:-0}"

            if [ -n "${DEPLOY_GITHUB_TOKEN:-}" ] && printf '%s' "$RAW_REPO_URL" | grep -q '^https://github.com/'; then
              REPO_URL="$(printf '%s' "$RAW_REPO_URL" | sed "s#https://github.com/#https://x-access-token:${DEPLOY_GITHUB_TOKEN}@github.com/#")"
            fi

            retry() {
              local retries=3
              local count=1
              until "$@"; do
                if [ "$count" -ge "$retries" ]; then
                  return 1
                fi
                count=$((count + 1))
                sleep 10
              done
            }

            if ! command -v git >/dev/null 2>&1; then
              echo "git is required on target server"
              exit 1
            fi
            if ! command -v docker >/dev/null 2>&1; then
              echo "docker is required on target server"
              exit 1
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "docker compose is required on target server"
              exit 1
            fi

            DEPLOY_STATE_DIR="$APP_DIR/.deploy"
            STATUS_FILE="$DEPLOY_STATE_DIR/status-${RUN_ID}.txt"
            LOG_FILE="$DEPLOY_STATE_DIR/deploy-${RUN_ID}.log"
            RUN_SCRIPT="$DEPLOY_STATE_DIR/run-${RUN_ID}.sh"

            mkdir -p "$APP_DIR" "$DEPLOY_STATE_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              retry git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git remote set-url origin "$REPO_URL" || true
            retry git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            if [ -n "${DEPLOY_GHCR_TOKEN:-}" ]; then
              GHCR_USER="${DEPLOY_GHCR_USER:-${{ github.repository_owner }}}"
              echo "${DEPLOY_GHCR_TOKEN}" | docker login "$REGISTRY" -u "$GHCR_USER" --password-stdin
            fi

            cat > "$RUN_SCRIPT" <<'SCRIPT'
            #!/usr/bin/env bash
            set -euo pipefail

            retry() {
              local retries=3
              local count=1
              until "$@"; do
                if [ "$count" -ge "$retries" ]; then
                  return 1
                fi
                count=$((count + 1))
                sleep 10
              done
            }

            probe_health() {
              if command -v curl >/dev/null 2>&1; then
                curl -fsS --max-time 5 "$HEALTHCHECK_URL" >/dev/null
                return $?
              fi
              if command -v wget >/dev/null 2>&1; then
                wget -q -T 5 -O - "$HEALTHCHECK_URL" >/dev/null
                return $?
              fi
              return 0
            }
            echo "running" > "$STATUS_FILE"
            cd "$APP_DIR"

            if retry env IMAGE_REGISTRY="$REGISTRY" IMAGE_REPO_OWNER="$OWNER" IMAGE_TAG="$TAG" docker compose pull && \
               env IMAGE_REGISTRY="$REGISTRY" IMAGE_REPO_OWNER="$OWNER" IMAGE_TAG="$TAG" docker compose up -d --remove-orphans; then
              ATTEMPT=0
              until probe_health; do
                ATTEMPT=$((ATTEMPT + 1))
                if [ "$ATTEMPT" -ge 30 ]; then
                  echo "health check failed for ${TAG}" >&2
                  echo "failed" > "$STATUS_FILE"
                  exit 1
                fi
                sleep 10
              done

              echo "success" > "$STATUS_FILE"
              docker image prune -f || true
              exit 0
            fi

            echo "failed" > "$STATUS_FILE"
            exit 1
            SCRIPT

            chmod +x "$RUN_SCRIPT"

            nohup env APP_DIR="$APP_DIR" REGISTRY="$REGISTRY" OWNER="$OWNER" TAG="$TAG" STATUS_FILE="$STATUS_FILE" LOG_FILE="$LOG_FILE" HEALTHCHECK_URL="$HEALTHCHECK_URL" "$RUN_SCRIPT" > "$LOG_FILE" 2>&1 &
            DEPLOY_PID=$!
            echo "Deployment started in background: pid=$DEPLOY_PID"
            echo "Status file: $STATUS_FILE"
            echo "Log file: $LOG_FILE"

            ELAPSED=0
            INTERVAL=15
            while [ "$ELAPSED" -lt "$MONITOR_SECONDS" ]; do
              STATUS="$(cat "$STATUS_FILE" 2>/dev/null || echo running)"
              if [ "$STATUS" = "success" ]; then
                echo "Deployment completed successfully."
                exit 0
              fi
              if [ "$STATUS" = "failed" ]; then
                echo "Deployment failed. Showing last 120 log lines:"
                tail -n 120 "$LOG_FILE" || true
                exit 1
              fi
              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            echo "Deployment is still running after ${MONITOR_SECONDS}s. CI exits without waiting further."
            echo "You can continue watching server log: tail -f $LOG_FILE"

