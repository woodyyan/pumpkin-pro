name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build:
    name: Build Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build backend
        run: |
          cd backend
          go mod download
          go build ./...

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python syntax check
        run: python -m compileall quant

  publish_images:
    name: Build and Push Images
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/pumpkin-pro-backend:latest
            ghcr.io/${{ github.repository_owner }}/pumpkin-pro-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/pumpkin-pro-frontend:latest
            ghcr.io/${{ github.repository_owner }}/pumpkin-pro-frontend:${{ github.sha }}

      - name: Build and push quant image
        uses: docker/build-push-action@v6
        with:
          context: ./quant
          file: ./quant/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/pumpkin-pro-quant:latest
            ghcr.io/${{ github.repository_owner }}/pumpkin-pro-quant:${{ github.sha }}

  deploy:
    name: Deploy to Server
    needs: publish_images
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH (key auth)
        if: ${{ vars.DEPLOY_AUTH_METHOD != 'password' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
          DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}
          DEPLOY_GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
          DEPLOY_GHCR_USER: ${{ secrets.DEPLOY_GHCR_USER }}
          DEPLOY_GHCR_TOKEN: ${{ secrets.DEPLOY_GHCR_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
          IMAGE_REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          script_stop: true
          envs: DEPLOY_APP_DIR,DEPLOY_REPO_URL,DEPLOY_BRANCH,DEPLOY_GITHUB_TOKEN,DEPLOY_GHCR_USER,DEPLOY_GHCR_TOKEN,IMAGE_TAG,IMAGE_REPO_OWNER,IMAGE_REGISTRY
          script: |
            set -euo pipefail

            APP_DIR="${DEPLOY_APP_DIR:-/opt/pumpkin-pro}"
            RAW_REPO_URL="${DEPLOY_REPO_URL:-https://github.com/${{ github.repository }}.git}"
            BRANCH="${DEPLOY_BRANCH:-main}"
            REPO_URL="$RAW_REPO_URL"

            if [ -n "${DEPLOY_GITHUB_TOKEN:-}" ] && printf '%s' "$RAW_REPO_URL" | grep -q '^https://github.com/'; then
              REPO_URL="$(printf '%s' "$RAW_REPO_URL" | sed "s#https://github.com/#https://x-access-token:${DEPLOY_GITHUB_TOKEN}@github.com/#")"
            fi

            retry() {
              local retries=3
              local count=1
              until "$@"; do
                if [ "$count" -ge "$retries" ]; then
                  return 1
                fi
                count=$((count + 1))
                sleep 3
              done
            }

            if ! command -v git >/dev/null 2>&1; then
              echo "git is required on target server"
              exit 1
            fi
            if ! command -v docker >/dev/null 2>&1; then
              echo "docker is required on target server"
              exit 1
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "docker compose is required on target server"
              exit 1
            fi

            mkdir -p "$APP_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              retry git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git remote set-url origin "$REPO_URL" || true
            retry git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            REGISTRY="${IMAGE_REGISTRY:-ghcr.io}"
            OWNER="${IMAGE_REPO_OWNER:-${{ github.repository_owner }}}"
            TAG="${IMAGE_TAG:-latest}"

            if [ -n "${DEPLOY_GHCR_TOKEN:-}" ]; then
              GHCR_USER="${DEPLOY_GHCR_USER:-${{ github.repository_owner }}}"
              echo "${DEPLOY_GHCR_TOKEN}" | docker login "$REGISTRY" -u "$GHCR_USER" --password-stdin
            fi

            retry env IMAGE_REGISTRY="$REGISTRY" IMAGE_REPO_OWNER="$OWNER" IMAGE_TAG="$TAG" docker compose pull
            env IMAGE_REGISTRY="$REGISTRY" IMAGE_REPO_OWNER="$OWNER" IMAGE_TAG="$TAG" docker compose up -d --remove-orphans
            docker image prune -f || true

      - name: Deploy over SSH (password auth)
        if: ${{ vars.DEPLOY_AUTH_METHOD == 'password' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
          DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}
          DEPLOY_GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
          DEPLOY_GHCR_USER: ${{ secrets.DEPLOY_GHCR_USER }}
          DEPLOY_GHCR_TOKEN: ${{ secrets.DEPLOY_GHCR_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
          IMAGE_REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script_stop: true
          envs: DEPLOY_APP_DIR,DEPLOY_REPO_URL,DEPLOY_BRANCH,DEPLOY_GITHUB_TOKEN,DEPLOY_GHCR_USER,DEPLOY_GHCR_TOKEN,IMAGE_TAG,IMAGE_REPO_OWNER,IMAGE_REGISTRY
          script: |
            set -euo pipefail

            APP_DIR="${DEPLOY_APP_DIR:-/opt/pumpkin-pro}"
            RAW_REPO_URL="${DEPLOY_REPO_URL:-https://github.com/${{ github.repository }}.git}"
            BRANCH="${DEPLOY_BRANCH:-main}"
            REPO_URL="$RAW_REPO_URL"

            if [ -n "${DEPLOY_GITHUB_TOKEN:-}" ] && printf '%s' "$RAW_REPO_URL" | grep -q '^https://github.com/'; then
              REPO_URL="$(printf '%s' "$RAW_REPO_URL" | sed "s#https://github.com/#https://x-access-token:${DEPLOY_GITHUB_TOKEN}@github.com/#")"
            fi

            retry() {
              local retries=3
              local count=1
              until "$@"; do
                if [ "$count" -ge "$retries" ]; then
                  return 1
                fi
                count=$((count + 1))
                sleep 3
              done
            }

            if ! command -v git >/dev/null 2>&1; then
              echo "git is required on target server"
              exit 1
            fi
            if ! command -v docker >/dev/null 2>&1; then
              echo "docker is required on target server"
              exit 1
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "docker compose is required on target server"
              exit 1
            fi

            mkdir -p "$APP_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              retry git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git remote set-url origin "$REPO_URL" || true
            retry git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            REGISTRY="${IMAGE_REGISTRY:-ghcr.io}"
            OWNER="${IMAGE_REPO_OWNER:-${{ github.repository_owner }}}"
            TAG="${IMAGE_TAG:-latest}"

            if [ -n "${DEPLOY_GHCR_TOKEN:-}" ]; then
              GHCR_USER="${DEPLOY_GHCR_USER:-${{ github.repository_owner }}}"
              echo "${DEPLOY_GHCR_TOKEN}" | docker login "$REGISTRY" -u "$GHCR_USER" --password-stdin
            fi

            retry env IMAGE_REGISTRY="$REGISTRY" IMAGE_REPO_OWNER="$OWNER" IMAGE_TAG="$TAG" docker compose pull
            env IMAGE_REGISTRY="$REGISTRY" IMAGE_REPO_OWNER="$OWNER" IMAGE_TAG="$TAG" docker compose up -d --remove-orphans
            docker image prune -f || true
