name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build:
    name: Build Checks
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build backend
        run: |
          cd backend
          go mod download
          go build ./...

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python syntax check
        run: python -m compileall quant

  publish_images:
    name: Build and Push Images to TCR
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
      IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE }}
      IMAGE_TAG: ${{ vars.IMAGE_TAG }}
      IMAGE_PLATFORM: ${{ vars.IMAGE_PLATFORM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["https://mirror.ccs.tencentyun.com"]

      - name: Resolve image variables
        id: resolve_images
        run: |
          set -euo pipefail

          IMAGE_REGISTRY="${IMAGE_REGISTRY:-ccr.ccs.tencentyun.com}"
          IMAGE_NAMESPACE="${IMAGE_NAMESPACE:-}"
          IMAGE_TAG="${IMAGE_TAG:-${GITHUB_SHA}}"
          IMAGE_PLATFORM="${IMAGE_PLATFORM:-linux/amd64}"

          if [ -z "$IMAGE_NAMESPACE" ]; then
            echo "IMAGE_NAMESPACE is empty. Please set Actions Variable IMAGE_NAMESPACE to your TCR namespace." >&2
            exit 1
          fi

          echo "image_registry=$IMAGE_REGISTRY" >> "$GITHUB_OUTPUT"
          echo "image_namespace=$IMAGE_NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image_platform=$IMAGE_PLATFORM" >> "$GITHUB_OUTPUT"

      - name: Login to TCR
        env:
          TCR_REGISTRY: ${{ steps.resolve_images.outputs.image_registry }}
          TCR_USERNAME: ${{ secrets.TCR_USERNAME }}
          TCR_PASSWORD: ${{ secrets.TCR_PASSWORD }}
        run: |
          max_attempts=3
          for attempt in $(seq 1 $max_attempts); do
            echo "::group::Login attempt $attempt/$max_attempts"
            if echo "$TCR_PASSWORD" | docker login "$TCR_REGISTRY" -u "$TCR_USERNAME" --password-stdin; then
              echo "::endgroup::"
              echo "✅ Login succeeded on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            if [ "$attempt" -lt "$max_attempts" ]; then
              wait_time=$((attempt * 10))
              echo "⚠️ Login failed, retrying in ${wait_time}s..."
              sleep "$wait_time"
            fi
          done
          echo "❌ Login failed after $max_attempts attempts"
          exit 1

      - name: Build and push backend image
        run: |
          docker buildx build \
            --platform "${{ steps.resolve_images.outputs.image_platform }}" \
            --cache-from "type=registry,ref=${{ steps.resolve_images.outputs.image_registry }}/${{ steps.resolve_images.outputs.image_namespace }}/pumpkin-pro-backend:buildcache" \
            --cache-to "type=registry,ref=${{ steps.resolve_images.outputs.image_registry }}/${{ steps.resolve_images.outputs.image_namespace }}/pumpkin-pro-backend:buildcache,mode=max,ignore-error=true" \
            -t "${{ steps.resolve_images.outputs.image_registry }}/${{ steps.resolve_images.outputs.image_namespace }}/pumpkin-pro-backend:${{ steps.resolve_images.outputs.image_tag }}" \
            -t "${{ steps.resolve_images.outputs.image_registry }}/${{ steps.resolve_images.outputs.image_namespace }}/pumpkin-pro-backend:latest" \
            --push ./backend

      - name: Build and push frontend image
        run: |
          docker buildx build \
            --platform "${{ steps.resolve_images.outputs.image_platform }}" \
            --cache-from "type=registry,ref=${{ steps.resolve_images.outputs.image_registry }}/${{ steps.resolve_images.outputs.image_namespace }}/pumpkin-pro-frontend:buildcache" \
            --cache-to "type=registry,ref=${{ steps.resolve_images.outputs.image_registry }}/${{ steps.resolve_images.outputs.image_namespace }}/pumpkin-pro-frontend:buildcache,mode=max,ignore-error=true" \
            -t "${{ steps.resolve_images.outputs.image_registry }}/${{ steps.resolve_images.outputs.image_namespace }}/pumpkin-pro-frontend:${{ steps.resolve_images.outputs.image_tag }}" \
            -t "${{ steps.resolve_images.outputs.image_registry }}/${{ steps.resolve_images.outputs.image_namespace }}/pumpkin-pro-frontend:latest" \
            --push ./frontend

      - name: Build and push quant image
        run: |
          docker buildx build \
            --platform "${{ steps.resolve_images.outputs.image_platform }}" \
            --cache-from "type=registry,ref=${{ steps.resolve_images.outputs.image_registry }}/${{ steps.resolve_images.outputs.image_namespace }}/pumpkin-pro-quant:buildcache" \
            --cache-to "type=registry,ref=${{ steps.resolve_images.outputs.image_registry }}/${{ steps.resolve_images.outputs.image_namespace }}/pumpkin-pro-quant:buildcache,mode=max,ignore-error=true" \
            -t "${{ steps.resolve_images.outputs.image_registry }}/${{ steps.resolve_images.outputs.image_namespace }}/pumpkin-pro-quant:${{ steps.resolve_images.outputs.image_tag }}" \
            -t "${{ steps.resolve_images.outputs.image_registry }}/${{ steps.resolve_images.outputs.image_namespace }}/pumpkin-pro-quant:latest" \
            --push ./quant

  deploy:
    name: Deploy to Server
    needs: publish_images
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Deploy over SSH (key auth)
        if: ${{ vars.DEPLOY_AUTH_METHOD == 'ssh' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
          DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}
          DEPLOY_GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
          DEPLOY_MONITOR_SECONDS: ${{ vars.DEPLOY_MONITOR_SECONDS }}
          DEPLOY_HEALTHCHECK_URL: ${{ vars.DEPLOY_HEALTHCHECK_URL }}
          DEPLOY_TCR_USERNAME: ${{ secrets.DEPLOY_TCR_USERNAME }}
          DEPLOY_TCR_PASSWORD: ${{ secrets.DEPLOY_TCR_PASSWORD }}
          IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
          IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE }}
          IMAGE_TAG: ${{ vars.IMAGE_TAG }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          script_stop: true
          command_timeout: 340m
          envs: DEPLOY_APP_DIR,DEPLOY_REPO_URL,DEPLOY_BRANCH,DEPLOY_GITHUB_TOKEN,DEPLOY_MONITOR_SECONDS,DEPLOY_HEALTHCHECK_URL,DEPLOY_TCR_USERNAME,DEPLOY_TCR_PASSWORD,IMAGE_REGISTRY,IMAGE_NAMESPACE,IMAGE_TAG,GITHUB_SHA,GITHUB_RUN_ID,GITHUB_RUN_ATTEMPT
          script: |
            set -euo pipefail

            APP_DIR="${DEPLOY_APP_DIR:-/opt/pumpkin-pro}"
            RAW_REPO_URL="${DEPLOY_REPO_URL:-https://github.com/${{ github.repository }}.git}"
            BRANCH="${DEPLOY_BRANCH:-main}"
            REPO_URL="$RAW_REPO_URL"
            MONITOR_SECONDS="${DEPLOY_MONITOR_SECONDS:-1200}"
            HEALTHCHECK_URL="${DEPLOY_HEALTHCHECK_URL:-http://127.0.0.1:8080/api/health}"
            IMAGE_REGISTRY="${IMAGE_REGISTRY:-ccr.ccs.tencentyun.com}"
            IMAGE_NAMESPACE="${IMAGE_NAMESPACE:-}"
            IMAGE_TAG="${IMAGE_TAG:-${GITHUB_SHA}}"
            RUN_ID="${GITHUB_RUN_ID:-manual}-${GITHUB_RUN_ATTEMPT:-0}"

            if [ -z "$IMAGE_NAMESPACE" ]; then
              echo "IMAGE_NAMESPACE is empty. Please set Actions Variable IMAGE_NAMESPACE." >&2
              exit 1
            fi

            if [ -n "${DEPLOY_GITHUB_TOKEN:-}" ] && printf '%s' "$RAW_REPO_URL" | grep -q '^https://github.com/'; then
              REPO_URL="$(printf '%s' "$RAW_REPO_URL" | sed "s#https://github.com/#https://x-access-token:${DEPLOY_GITHUB_TOKEN}@github.com/#")"
            fi

            retry() {
              local retries=3
              local count=1
              until "$@"; do
                if [ "$count" -ge "$retries" ]; then
                  return 1
                fi
                count=$((count + 1))
                sleep 10
              done
            }

            if ! command -v git >/dev/null 2>&1; then
              echo "git is required on target server"
              exit 1
            fi
            if ! command -v docker >/dev/null 2>&1; then
              echo "docker is required on target server"
              exit 1
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "docker compose is required on target server"
              exit 1
            fi

            mkdir -p "$APP_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              retry git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git remote set-url origin "$REPO_URL" || true
            retry git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git sparse-checkout disable >/dev/null 2>&1 || true
            git reset --hard "origin/$BRANCH"
            git clean -fd

            REPO_ROOT="$(git rev-parse --show-toplevel)"
            APP_DIR="$REPO_ROOT"
            DEPLOY_STATE_DIR="$APP_DIR/.deploy"
            STATUS_FILE="$DEPLOY_STATE_DIR/status-${RUN_ID}.txt"
            LOG_FILE="$DEPLOY_STATE_DIR/deploy-${RUN_ID}.log"
            RUN_SCRIPT="$DEPLOY_STATE_DIR/run-${RUN_ID}.sh"
            mkdir -p "$DEPLOY_STATE_DIR"

            COMPOSE_FILE="$APP_DIR/docker-compose.yml"
            if [ ! -f "$COMPOSE_FILE" ]; then
              FOUND_COMPOSE="$(find "$APP_DIR" -maxdepth 4 -name docker-compose.yml -print -quit || true)"
              if [ -n "$FOUND_COMPOSE" ]; then
                COMPOSE_FILE="$FOUND_COMPOSE"
              fi
            fi

            if [ ! -f "$COMPOSE_FILE" ]; then
              echo "docker-compose.yml not found in $APP_DIR"
              echo "Repo root: $REPO_ROOT"
              echo "Current HEAD: $(git rev-parse --short HEAD)"
              echo "Tracked compose files:"
              git ls-files '*compose*.yml' || true
              echo "Directory listing:"
              ls -la "$APP_DIR" || true
              exit 1
            fi

            cat > "$RUN_SCRIPT" <<'SCRIPT'
            #!/usr/bin/env bash
            set -euo pipefail

            probe_health() {
              if command -v curl >/dev/null 2>&1; then
                curl -fsS --max-time 5 "$HEALTHCHECK_URL" >/dev/null
                return $?
              fi
              if command -v wget >/dev/null 2>&1; then
                wget -q -T 5 -O - "$HEALTHCHECK_URL" >/dev/null
                return $?
              fi
              return 0
            }

            retry_pull() {
              local max_attempts=3
              local attempt=1
              while [ "$attempt" -le "$max_attempts" ]; do
                echo "📦 docker compose pull (attempt $attempt/$max_attempts)..."
                if docker compose -f "$COMPOSE_FILE" pull; then
                  echo "✅ Pull succeeded on attempt $attempt"
                  return 0
                fi
                if [ "$attempt" -lt "$max_attempts" ]; then
                  local wait=$((attempt * 15))
                  echo "⚠️ Pull failed, retrying in ${wait}s..."
                  sleep "$wait"
                fi
                attempt=$((attempt + 1))
              done
              echo "❌ Pull failed after $max_attempts attempts"
              return 1
            }

            echo "running" > "$STATUS_FILE"
            cd "$APP_DIR"

            if [ -n "${DEPLOY_TCR_USERNAME:-}" ] && [ -n "${DEPLOY_TCR_PASSWORD:-}" ]; then
              echo "$DEPLOY_TCR_PASSWORD" | docker login "$IMAGE_REGISTRY" -u "$DEPLOY_TCR_USERNAME" --password-stdin
            fi

            export IMAGE_REGISTRY IMAGE_NAMESPACE IMAGE_TAG

            if retry_pull && docker compose -f "$COMPOSE_FILE" up -d --remove-orphans; then
              ATTEMPT=0
              until probe_health; do
                ATTEMPT=$((ATTEMPT + 1))
                if [ "$ATTEMPT" -ge 30 ]; then
                  echo "health check failed" >&2
                  echo "failed" > "$STATUS_FILE"
                  exit 1
                fi
                sleep 10
              done

              echo "success" > "$STATUS_FILE"
              docker image prune -f || true
              exit 0
            fi

            echo "failed" > "$STATUS_FILE"
            exit 1
            SCRIPT

            chmod +x "$RUN_SCRIPT"

            nohup env APP_DIR="$APP_DIR" STATUS_FILE="$STATUS_FILE" LOG_FILE="$LOG_FILE" HEALTHCHECK_URL="$HEALTHCHECK_URL" COMPOSE_FILE="$COMPOSE_FILE" DEPLOY_TCR_USERNAME="$DEPLOY_TCR_USERNAME" DEPLOY_TCR_PASSWORD="$DEPLOY_TCR_PASSWORD" IMAGE_REGISTRY="$IMAGE_REGISTRY" IMAGE_NAMESPACE="$IMAGE_NAMESPACE" IMAGE_TAG="$IMAGE_TAG" "$RUN_SCRIPT" > "$LOG_FILE" 2>&1 &
            DEPLOY_PID=$!
            echo "Deployment started in background: pid=$DEPLOY_PID"
            echo "Status file: $STATUS_FILE"
            echo "Log file: $LOG_FILE"

            ELAPSED=0
            INTERVAL=15
            while [ "$ELAPSED" -lt "$MONITOR_SECONDS" ]; do
              STATUS="$(cat "$STATUS_FILE" 2>/dev/null || echo running)"
              if [ "$STATUS" = "success" ]; then
                echo "Deployment completed successfully."
                exit 0
              fi
              if [ "$STATUS" = "failed" ]; then
                echo "Deployment failed. Showing last 120 log lines:"
                tail -n 120 "$LOG_FILE" || true
                exit 1
              fi
              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            echo "Deployment is still running after ${MONITOR_SECONDS}s. CI exits without waiting further."
            echo "You can continue watching server log: tail -f $LOG_FILE"

      - name: Deploy over SSH (password auth)
        if: ${{ vars.DEPLOY_AUTH_METHOD != 'ssh' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
          DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}
          DEPLOY_GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
          DEPLOY_MONITOR_SECONDS: ${{ vars.DEPLOY_MONITOR_SECONDS }}
          DEPLOY_HEALTHCHECK_URL: ${{ vars.DEPLOY_HEALTHCHECK_URL }}
          DEPLOY_TCR_USERNAME: ${{ secrets.DEPLOY_TCR_USERNAME }}
          DEPLOY_TCR_PASSWORD: ${{ secrets.DEPLOY_TCR_PASSWORD }}
          IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
          IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE }}
          IMAGE_TAG: ${{ vars.IMAGE_TAG }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script_stop: true
          command_timeout: 340m
          envs: DEPLOY_APP_DIR,DEPLOY_REPO_URL,DEPLOY_BRANCH,DEPLOY_GITHUB_TOKEN,DEPLOY_MONITOR_SECONDS,DEPLOY_HEALTHCHECK_URL,DEPLOY_TCR_USERNAME,DEPLOY_TCR_PASSWORD,IMAGE_REGISTRY,IMAGE_NAMESPACE,IMAGE_TAG,GITHUB_SHA,GITHUB_RUN_ID,GITHUB_RUN_ATTEMPT
          script: |
            set -euo pipefail

            APP_DIR="${DEPLOY_APP_DIR:-/opt/pumpkin-pro}"
            RAW_REPO_URL="${DEPLOY_REPO_URL:-https://github.com/${{ github.repository }}.git}"
            BRANCH="${DEPLOY_BRANCH:-main}"
            REPO_URL="$RAW_REPO_URL"
            MONITOR_SECONDS="${DEPLOY_MONITOR_SECONDS:-1200}"
            HEALTHCHECK_URL="${DEPLOY_HEALTHCHECK_URL:-http://127.0.0.1:8080/api/health}"
            IMAGE_REGISTRY="${IMAGE_REGISTRY:-ccr.ccs.tencentyun.com}"
            IMAGE_NAMESPACE="${IMAGE_NAMESPACE:-}"
            IMAGE_TAG="${IMAGE_TAG:-${GITHUB_SHA}}"
            RUN_ID="${GITHUB_RUN_ID:-manual}-${GITHUB_RUN_ATTEMPT:-0}"

            if [ -z "$IMAGE_NAMESPACE" ]; then
              echo "IMAGE_NAMESPACE is empty. Please set Actions Variable IMAGE_NAMESPACE." >&2
              exit 1
            fi

