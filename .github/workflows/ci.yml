name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend (Go) ──
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Vet
        run: go vet ./...

      - name: Unit Tests
        run: |
          go test -v -count=1 -race ./... -timeout 120s
        env:
          GORM_DIALECT: sqlite
          DB_PATH: ":memory:"
          AUTH_JWT_SECRET: "test-secret-for-ci-only"

      - name: Coverage Gate (store/ ≥20%)
        run: |
          go test -count=1 -coverprofile=coverage.out -covermode=atomic ./store/...
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Store coverage: ${TOTAL}%"
          if (( $(echo "$TOTAL < 20" | bc -l) )); then
            echo "::error::Coverage ${TOTAL}% is below threshold 20%"
            exit 1
          fi
          echo "::notice::Coverage ${TOTAL}% passes threshold 20 %E2%9C%85"
        env:
          GORM_DIALECT: sqlite
          DB_PATH: ":memory:"
          AUTH_JWT_SECRET: "test-secret-for-ci-only"

      - name: Build
        run: go build ./...

  # ── Quant (Python) ──
  quant:
    name: Quant (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quant

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies (math only, no akshare)
        run: pip install pandas numpy pytest matplotlib pytest-cov pydantic

      - name: Syntax check
        run: python -m compileall -q .

      - name: Unit Tests with Coverage Gate (≥30%)
        run: pytest tests/ -v --tb=short -q --strict-markers --cov=indicators --cov=result --cov=strategy --cov=strategy_library --cov=engine --cov=config --cov=screener --cov-report=term-missing --cov-fail-under=30
        env:
          PYTHONPATH: .

  # ── Frontend (Node.js) ──
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint . --ext .js,.jsx --max-warnings 999 || true

      - name: Unit Tests
        run: npm test

      - name: Build
        run: npm run build
