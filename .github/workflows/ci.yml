name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend (Go) ──
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Vet
        run: go vet ./...

      - name: Unit Tests
        run: |
          go test -v -count=1 -race \
            ./config/ \
            ./store/auth/ \
            ./store/portfolio/ \
            -timeout 60s
        env:
          GORM_DIALECT: sqlite
          DB_PATH: ":memory:"
          AUTH_JWT_SECRET: "test-secret-for-ci-only"

      - name: Build
        run: go build ./...

  # ── Quant (Python) ──
  quant:
    name: Quant (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quant

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies (math only, no akshare)
        run: pip install pandas numpy pytest

      - name: Syntax check
        run: python -m compileall -q .

      - name: Unit Tests
        run: pytest tests/ -v --tb=short -q --strict-markers
        env:
          PYTHONPATH: .

  # ── Frontend (Node.js) ──
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint . --ext .js,.jsx --max-warnings 999 || true

      - name: Build
        run: npm run build
