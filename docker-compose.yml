# ==================================
# Wolong Pro - Architecture
# ==================================

version: '3.8'

services:
  # 1. 前端服务 (React + Next.js)
  frontend:
    image: ${IMAGE_REGISTRY:-ccr.ccs.tencentyun.com}/${IMAGE_NAMESPACE:-pumpkin-pro}/pumpkin-pro-frontend:${IMAGE_TAG:-latest}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - BACKEND_API_URL=http://backend:8080
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    # 移除主机挂载，防止宿主机的环境(Mac)和容器的环境(Alpine Linux)互相污染 node_modules

  # 2. 核心交易网关与 API 服务 (Go)
  backend:
    image: ${IMAGE_REGISTRY:-ccr.ccs.tencentyun.com}/${IMAGE_NAMESPACE:-pumpkin-pro}/pumpkin-pro-backend:${IMAGE_TAG:-latest}
    ports:
      - "8080:8080"
    environment:
      - GO_ENV=development
      - QUANT_SERVICE_URL=http://quant:8000
      - BACKEND_CALLBACK_URL=http://backend:8080
      - DB_TYPE=${DB_TYPE:-sqlite}
      - DB_PATH=${DB_PATH:-/app/data/pumpkin.db}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-pumpkin_pro}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - STRATEGY_SEED_PATH=${STRATEGY_SEED_PATH:-seed/strategies.json}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET}
      - ADMIN_SEED_EMAIL=${ADMIN_SEED_EMAIL}
      - ADMIN_SEED_PASSWORD=${ADMIN_SEED_PASSWORD}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.openai.com/v1}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
    volumes:
      - ./data:/app/data
    depends_on:
      - quant

  # 3. 策略计算微服务 (Python + FastAPI)
  quant:
    image: ${IMAGE_REGISTRY:-ccr.ccs.tencentyun.com}/${IMAGE_NAMESPACE:-pumpkin-pro}/pumpkin-pro-quant:${IMAGE_TAG:-latest}
    ports:
      - "8000:8000"
    volumes:
      - ./data/quant:/app/data/cache
