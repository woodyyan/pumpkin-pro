# ==================================
# Pumpkin Trader Pro - Architecture
# ==================================

version: '3.8'

services:
  # 1. 前端服务 (React + Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # 2. 核心交易网关与 API 服务 (Go)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GO_ENV=development
      - QUANT_SERVICE_URL=http://quant:8000
    depends_on:
      - quant
    volumes:
      - ./backend:/app

  # 3. 策略计算微服务 (Python + FastAPI)
  quant:
    build:
      context: ./quant
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./quant:/app
